<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>rac.so — Racso</title>
<link id="favicon" rel="icon" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --void:      #222c33;
  --n2:        #29333e;
  --n3:        #313f4c;
  --n4:        #6a8090;
  --n5:        #ccd6e0;
  --lava:      #f33c2c;
  --vitellary: #f0a030;
  --viridian:  #2a9d8f;
  --violet:    #9966ff;
  --vermilion: #cc2936;
  --verdigris: #40b868;
  --victoria:  #4466dd;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--void);
  cursor: crosshair;
}

#canvas {
  display: block;
  position: fixed;
  inset: 0;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 7px,
    rgba(0,0,0,0.04) 7px, rgba(0,0,0,0.04) 8px
  );
  pointer-events: none;
  z-index: 40;
}

/* Grain */
body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  z-index: 41;
}

/* Bottom vignette */
#vignette {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 300px;
  background: linear-gradient(to top,
    rgba(34,44,51,0.97) 0%,
    rgba(34,44,51,0.75) 35%,
    rgba(34,44,51,0.2)  65%,
    transparent 100%
  );
  pointer-events: none;
  z-index: 10;
}

/* Left vignette */
#vignette-left {
  position: fixed;
  bottom: 0; left: 0; top: 0;
  width: 200px;
  background: linear-gradient(to right, rgba(34,44,51,0.6) 0%, transparent 100%);
  pointer-events: none;
  z-index: 10;
}

/* ── Identity ──────────────────────────────────────── */
#identity {
  position: fixed;
  bottom: 32px; left: 36px;
  z-index: 20;
  opacity: 0;
  animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
}

#name-big {
  font-family: 'Chakra Petch', sans-serif;
  font-weight: 700;
  font-size: clamp(72px, 12vw, 172px);
  line-height: 0.86;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  /* Initial state — JS updates this dynamically each generation */
  background: linear-gradient(105deg, #f33c2c 70%, #f33c2c 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 48px rgba(243,60,44,0.3));
}

#name-sub {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-top: 12px;
  padding-left: 2px;
}

#name-full {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(13px, 1.2vw, 18px);
  font-weight: 300;
  font-style: italic;
  color: var(--n4);
  letter-spacing: 0.18em;
}

#name-handle {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(11px, 0.95vw, 14px);
  font-weight: 300;
  color: var(--n3);
  letter-spacing: 0.2em;
}

/* ── Social links ────────────────────────────────── */
#links {
  position: fixed;
  bottom: 44px; right: 40px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
  opacity: 0;
  animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;
}

#links a {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(12px, 1.05vw, 16px);
  font-weight: 300;
  color: var(--n4);
  text-decoration: none;
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  transition: color 0.2s ease;
}

#links a .arrow {
  display: inline-block;
  width: 0; overflow: hidden; opacity: 0;
  transition: width 0.2s ease, opacity 0.2s ease;
  font-size: 0.85em;
}

#links a:hover .arrow  { width: 16px; opacity: 0.7; }
#links a.gh:hover      { color: var(--n5); }
#links a.li:hover      { color: var(--victoria); }

/* ── Generation counter ──────────────────────────── */
#gen-counter {
  position: fixed;
  top: 24px; right: 40px;
  z-index: 20;
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 400;
  color: var(--n5);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  opacity: 0;
  animation: rise 1s ease 1.2s forwards;
  pointer-events: none;
}

/* Milestone glow is driven by JS inline styles + this transition */
#gen-counter { transition: color 0.7s ease, text-shadow 0.7s ease; }

/* ── Info ──────────────────────────────────────────── */
#info {
  position: fixed;
  bottom: 16px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 300;
  color: var(--n3);
  letter-spacing: 0.28em;
  text-transform: uppercase;
  white-space: nowrap;
  opacity: 0;
  animation: fadeIn 1s ease 1.5s forwards;
  cursor: default;
  transition: color 0.3s;
}
#info:hover { color: var(--n4); }

/* ── Keyframes ─────────────────────────────────────── */
@keyframes rise {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="vignette"></div>
<div id="vignette-left"></div>

<div id="identity">
  <div id="name-big">Racso</div>
  <div id="name-sub">
    <span id="name-full">Óscar F. Gómez</span>
    <span id="name-handle">· rac.so</span>
  </div>
</div>

<div id="links">
  <a href="https://github.com/racso" class="gh" target="_blank" rel="noopener">
    <span class="arrow">↗&nbsp;</span>github
  </a>
  <a href="https://linkedin.com/in/racso" class="li" target="_blank" rel="noopener">
    <span class="arrow">↗&nbsp;</span>linkedin
  </a>
</div>

<div id="gen-counter">gen <span id="gen-val">0000</span></div>

<div id="info">r-pentomino · click to restart</div>

<script>
(function () {
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const genEl   = document.getElementById('gen-val');
  const genCtr  = document.getElementById('gen-counter');
  const nameBig = document.getElementById('name-big');
  const favicon = document.getElementById('favicon');

  // ── Palette ─────────────────────────────────────────
  const V = {
    void:      [34,  44,  51 ],
    lava:      [243, 60,  44 ],
    vitellary: [240, 160, 48 ],
    verdigris: [64,  184, 104],
    viridian:  [42,  157, 143],
    victoria:  [68,  102, 221],
    violet:    [153, 102, 255],
    vermilion: [204, 41,  54 ],
  };

  // Global cell color — all alive cells share one color that shifts with generations
  // Gen 1→25: lava→vermilion, 25→100: vermilion→vitellary, then continues through palette
  function globalColor(g) {
    if (g <= 100)  return lerp3(V.lava,      V.vermilion, (g - 1)   / 99);
    if (g <= 300)  return lerp3(V.vermilion, V.vitellary, (g - 100) / 200);
    if (g <= 600)  return lerp3(V.vitellary, V.verdigris, (g - 300) / 300);
    if (g <= 1000) return lerp3(V.verdigris, V.viridian,  (g - 600) / 400);
    if (g <= 1400) return lerp3(V.viridian,  V.victoria,  (g - 1000) / 400);
    return lerp3(V.victoria, V.violet, Math.min(1, (g - 1400) / 300));
  }

  function lerp3(a, b, t) {
    return [(a[0]+(b[0]-a[0])*t)|0, (a[1]+(b[1]-a[1])*t)|0, (a[2]+(b[2]-a[2])*t)|0];
  }

  // ── Config ──────────────────────────────────────────
  const CELL       = 8;
  const GAP        = 1;
  const SZ         = CELL - GAP;
  const FPS        = 20;
  const INTERVAL   = 1000 / FPS;
  const HEAT_DECAY = 1 / (FPS * 1.1);
  const FADE_MUL   = 0.87;
  const RESTART_AT = 1700;
  const THRESH     = 0.005;
  const CORNER_R   = 1.5;
  // Extra cells beyond the viewport on every side — gives gliders ~800 gens of
  // travel room before reaching a dead border (no wrapping).
  const MARGIN     = 20;

  // Zoom config: start zoomed in, pull back to 1× over ZOOM_GENS generations
  const ZOOM_START = 7;
  const ZOOM_GENS  = 380;
  // Brief intro pause (ms) before simulation begins, to show the seed
  const INTRO_MS   = 1200;

  const R_PENT = [[1,0],[2,0],[0,1],[1,1],[1,2]];

  let cols, rows, extCols, extRows, W, H;
  let cells, heat;
  let gen = 0, fading = false, last = 0;
  let intro = true, introStart = 0;

  // ── Zoom ────────────────────────────────────────────
  function getScale(g) {
    if (g >= ZOOM_GENS) return 1;
    const t    = g / ZOOM_GENS;
    const ease = 1 - Math.pow(1 - t, 4); // ease-out quartic
    return ZOOM_START + (1 - ZOOM_START) * ease;
  }

  // ── Setup ───────────────────────────────────────────
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cols    = Math.floor(W / CELL);
    rows    = Math.floor(H / CELL);
    extCols = cols + 2 * MARGIN;
    extRows = rows + 2 * MARGIN;
    cells = new Uint8Array(extCols * extRows);
    heat  = new Float32Array(extCols * extRows);
    gen = 0; fading = false;
    seed();
  }

  function seed() {
    cells.fill(0); heat.fill(0);
    gen = 0; fading = false; intro = true; introStart = performance.now();
    const cx = Math.floor(extCols / 2) - 1;
    const cy = Math.floor(extRows / 2) - 1;
    for (const [dx, dy] of R_PENT) {
      const i = (cy + dy) * extCols + (cx + dx);
      if (i >= 0 && i < cells.length) {
        cells[i] = 1; heat[i] = 1;
      }
    }
  }

  // ── Simulation ──────────────────────────────────────
  function step() {
    const next = new Uint8Array(extCols * extRows);
    for (let y = 0; y < extRows; y++) {
      for (let x = 0; x < extCols; x++) {
        let n = 0;
        for (let dy = -1; dy <= 1; dy++)
          for (let dx = -1; dx <= 1; dx++) {
            if (!dx && !dy) continue;
            const nx = x + dx, ny = y + dy;
            // Fixed border: cells outside the grid are permanently dead
            if (nx >= 0 && nx < extCols && ny >= 0 && ny < extRows)
              n += cells[ny * extCols + nx];
          }
        const alive = cells[y * extCols + x];
        next[y * extCols + x] = alive ? (n===2||n===3?1:0) : (n===3?1:0);
      }
    }
    for (let i = 0; i < cells.length; i++) {
      if (next[i]) {
        heat[i] = 1;
      } else {
        heat[i] = Math.max(0, heat[i] - HEAT_DECAY);
        if (heat[i] < THRESH) heat[i] = 0;
      }
    }
    cells = next;
    gen++;
  }

  function fadeStep() {
    let anyHot = false;
    for (let i = 0; i < heat.length; i++) {
      heat[i] *= FADE_MUL;
      if (heat[i] < THRESH) heat[i] = 0;
      else anyHot = true;
    }
    return anyHot;
  }

  // ── Rendering ───────────────────────────────────────
  function drawCells(scale, glowStrength) {
    // Zoom anchor = centre of extended grid (which is where the R-pentomino lives)
    const cxGrid = extCols / 2 * CELL;
    const cyGrid = extRows / 2 * CELL;

    // Viewport culling: only draw cells visible at current scale
    const halfW  = (W / 2) / scale;
    const halfH  = (H / 2) / scale;
    const minX   = Math.max(0,         Math.floor((cxGrid - halfW) / CELL) - 1);
    const maxX   = Math.min(extCols-1, Math.ceil ((cxGrid + halfW) / CELL) + 1);
    const minY   = Math.max(0,         Math.floor((cyGrid - halfH) / CELL) - 1);
    const maxY   = Math.min(extRows-1, Math.ceil ((cyGrid + halfH) / CELL) + 1);

    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(scale, scale);
    ctx.translate(-cxGrid, -cyGrid);

    if (glowStrength > 0) {
      ctx.shadowColor = `rgba(243,60,44,${glowStrength})`;
      ctx.shadowBlur  = 16 + 14 * glowStrength;
    }

    for (let y = minY; y <= maxY; y++) {
      for (let x = minX; x <= maxX; x++) {
        const i = y * extCols + x;
        const h = heat[i];
        if (h < THRESH) continue;

        const base = globalColor(gen);
        const col  = cells[i]
          ? base
          : lerp3(V.void, base, h * h * 1.2);

        ctx.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
        ctx.beginPath();
        ctx.roundRect(x*CELL+GAP, y*CELL+GAP, SZ, SZ, CORNER_R);
        ctx.fill();
      }
    }

    if (glowStrength > 0) ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawSpotlight(scale) {
    // Soft radial spotlight behind the R-pentomino during early zoom
    const intensity = Math.max(0, 1 - gen / 60);
    if (intensity <= 0) return;
    const cx = W / 2;
    const cy = H / 2;
    const r  = 200 * scale;
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grd.addColorStop(0, `rgba(243,60,44,${0.07 * intensity})`);
    grd.addColorStop(1, 'rgba(243,60,44,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  }

  function render(glowOverride) {
    ctx.fillStyle = '#222c33';
    ctx.fillRect(0, 0, W, H);

    const scale = intro ? ZOOM_START : getScale(gen);

    // Glow: strong during intro, fades over first 60 gens after that
    let glow = glowOverride !== undefined
      ? glowOverride
      : Math.max(0, 1 - gen / 60);

    drawSpotlight(scale);
    drawCells(scale, glow);
  }

  // ── Favicon ───────────────────────────────────────────
  // 5×5 grid, void bg, lava R-pentomino, 1-cell margin → 32×32px (6px/cell, 1px pad)
  function buildFavicon() {
    const SIZE = 32, CS = 6, PAD = 1;
    const fc   = document.createElement('canvas');
    fc.width = fc.height = SIZE;
    const fx = fc.getContext('2d');
    fx.fillStyle = '#222c33';
    fx.fillRect(0, 0, SIZE, SIZE);
    fx.fillStyle = '#f33c2c';
    // R-pentomino in 5×5 grid with 1-cell margin: cells at (cx, cy)
    for (const [cx, cy] of [[2,1],[3,1],[1,2],[2,2],[2,3]])
      fx.fillRect(PAD + cx * CS, PAD + cy * CS, CS, CS);
    favicon.href = fc.toDataURL('image/png');
  }

  // ── Name gradient ──────────────────────────────────────
  // Lava for the first 70%, then fades to the current simulation colour
  function updateNameGradient() {
    const [r, g, b] = globalColor(gen);
    nameBig.style.backgroundImage =
      `linear-gradient(105deg, #f33c2c 70%, rgb(${r},${g},${b}) 100%)`;
  }

  // ── Milestone glow ────────────────────────────────────
  // Snap to lava instantly, then let CSS transition fade it back to --n5
  function flashMilestone() {
    genCtr.style.transition = 'none';
    genCtr.style.color = '#f33c2c';
    genCtr.style.textShadow = '0 0 10px rgba(243,60,44,1), 0 0 28px rgba(243,60,44,0.5), 0 0 56px rgba(243,60,44,0.2)';
    void genCtr.offsetWidth; // flush
    genCtr.style.transition = ''; // re-enable CSS transition
    setTimeout(() => {
      genCtr.style.color = '';
      genCtr.style.textShadow = '';
    }, 350);
  }

  // ── Loop ────────────────────────────────────────────
  function loop(ts) {
    requestAnimationFrame(loop);
    if (ts - last < INTERVAL) return;
    last = ts;

    if (intro) {
      // Pulsing glow while paused on the seed
      const pulse = 0.6 + 0.4 * Math.sin(ts / 380);
      render(pulse);
      if (ts - introStart >= INTRO_MS) intro = false;
      return;
    }

    if (!fading) {
      step();
      render();
      genEl.textContent = String(gen).padStart(4, '0');
      updateNameGradient();
      if (gen > 0 && gen % 100 === 0) flashMilestone();
      if (gen >= RESTART_AT) fading = true;
    } else {
      if (fadeStep()) render();
      else seed();
    }
  }

  // ── Events ──────────────────────────────────────────
  canvas.addEventListener('click', seed);
  window.addEventListener('resize', resize);

  buildFavicon();
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
